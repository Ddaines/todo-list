<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Список задач</h1>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Введите задачу..." autocomplete="off"/>
      <button id="addBtn">+</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer" id="footer">
      <span id="taskCount">0 задач</span>
      <button id="clearBtn">Очистить всё</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
